name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (核心依赖 + dev，跳过重型 CLIP 权重库)
        run: |
          python -m pip install --upgrade pip
          # 装 CPU 版 torch，避免拉 CUDA
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check polyseek tests scripts

      # 类型检查：当前为「渐进式类型化」——非阻断，仅作参考。
      # 随着类型标注补全，未来可去掉 `|| true` 改为强制。见 README「开发」小节。
      - name: Mypy type check (non-blocking, gradual typing)
        run: mypy polyseek || true

      - name: Pytest（用 Fake 组件，无需模型/外部 DB）
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build CPU image (仅验证可构建，不推送)
        # CI 跑在海外 runner，用官方源覆盖 Dockerfile 里默认的国内镜像，避免慢/失败
        run: |
          docker build -f Dockerfile -t polyseek:ci \
            --build-arg APT_MIRROR=deb.debian.org \
            --build-arg PIP_INDEX=https://pypi.org/simple \
            --build-arg TORCH_INDEX=https://download.pytorch.org/whl/cpu \
            .
