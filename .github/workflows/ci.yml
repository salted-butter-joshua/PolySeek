name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (核心依赖 + dev，跳过重型 CLIP 权重库)
        working-directory: media-mind
        run: |
          python -m pip install --upgrade pip
          # 装 CPU 版 torch，避免拉 CUDA
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: media-mind
        run: ruff check media_mind tests scripts

      - name: Mypy type check
        working-directory: media-mind
        run: mypy media_mind || true   # 类型检查暂不阻断（渐进式）

      - name: Pytest（用 Fake 组件，无需模型/外部 DB）
        working-directory: media-mind
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build CPU image (仅验证可构建，不推送)
        working-directory: media-mind
        run: docker build -f Dockerfile -t media-mind:ci .
