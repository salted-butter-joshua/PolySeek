# GPU 部署（RTX 2080 Ubuntu 服务器）：Qdrant + GPU 版 API / indexer / webui。
#
# 前置：安装 NVIDIA 驱动 + nvidia-container-toolkit
#   sudo apt install nvidia-container-toolkit && sudo systemctl restart docker
#   验证：docker run --rm --gpus all nvidia/cuda:12.1.0-base-ubuntu22.04 nvidia-smi
#
# 用法：
#   docker compose -f docker-compose.gpu.yaml up -d qdrant api
#   docker compose -f docker-compose.gpu.yaml run --rm indexer      # 跑一次索引
#   docker compose -f docker-compose.gpu.yaml up -d webui           # http://<ip>:7860

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

# 构建配置（含国内镜像源 build-args）。换官方源改这里即可。
x-build: &build
  context: .
  dockerfile: Dockerfile.gpu
  args:
    APT_MIRROR: mirrors.tuna.tsinghua.edu.cn
    PIP_INDEX: https://pypi.tuna.tsinghua.edu.cn/simple
    # 清华 PyPI 的 torch 即 CUDA 构建；要锁 cu121 改为 https://mirror.sjtu.edu.cn/pytorch-wheels/cu121
    TORCH_INDEX: https://pypi.tuna.tsinghua.edu.cn/simple

services:
  qdrant:
    image: qdrant/qdrant:v1.18.0   # 必须与 pip 的 qdrant-client 版本对齐，否则 gRPC 协议不匹配导致插入报 dim 0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # qdrant 镜像不含 wget/curl，用 bash 内建 /dev/tcp 探测 6333 端口是否在监听
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build: *build
    <<: *gpu
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8900:8900"
    environment:
      POLYSEEK_CONFIG: /app/config.docker.yaml
      POLYSEEK__EMBEDDING__DEVICE: cuda
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ./config.docker.yaml:/app/config.docker.yaml:ro
      - model_cache:/app/models
      - index_state:/app/data
      - ./sample_data:/data/media:ro

  indexer:
    build: *build
    <<: *gpu
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      POLYSEEK_CONFIG: /app/config.docker.yaml
      POLYSEEK__EMBEDDING__DEVICE: cuda
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ./config.docker.yaml:/app/config.docker.yaml:ro
      - model_cache:/app/models
      - index_state:/app/data
      - ./sample_data:/data/media:ro
    command: ["python", "scripts/index_incremental.py", "-c", "/app/config.docker.yaml"]

  webui:
    build: *build
    <<: *gpu
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "7860:7860"
    environment:
      POLYSEEK_CONFIG: /app/config.docker.yaml
      POLYSEEK__EMBEDDING__DEVICE: cuda
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ./config.docker.yaml:/app/config.docker.yaml:ro
      - model_cache:/app/models
      - index_state:/app/data
      - ./sample_data:/data/media:ro
    command: ["python", "-m", "polyseek.webui.app"]

volumes:
  qdrant_storage:
  model_cache:
  index_state:
