# media-mind 容器编排：Qdrant（向量库）+ API + 可选 Web UI。
#
# 常用命令：
#   docker compose up -d qdrant api           # 起向量库和 API
#   docker compose run --rm indexer            # 跑一次全量索引
#   docker compose up -d webui                 # 起 Gradio UI (http://localhost:7860)
#
# 把 NAS 目录挂进容器：修改下面 volumes 的宿主机路径。

services:
  qdrant:
    image: qdrant/qdrant:v1.18.0   # 必须与 pip 的 qdrant-client 版本对齐，否则 gRPC 协议不匹配导致插入报 dim 0
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # qdrant 镜像不含 wget/curl，用 bash 内建 /dev/tcp 探测 6333 端口是否在监听
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build: .
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8900:8900"
    environment:
      MEDIA_MIND_CONFIG: /app/config.docker.yaml
    volumes:
      - ./config.docker.yaml:/app/config.docker.yaml:ro
      - model_cache:/app/models
      - index_state:/app/data
      # 把你的 NAS 媒体目录挂进来（只读）
      - ./sample_data:/data/media:ro
    command: ["uvicorn", "media_mind.api.server:app", "--host", "0.0.0.0", "--port", "8900"]

  # 一次性索引任务：docker compose run --rm indexer
  indexer:
    build: .
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      MEDIA_MIND_CONFIG: /app/config.docker.yaml
    volumes:
      - ./config.docker.yaml:/app/config.docker.yaml:ro
      - model_cache:/app/models
      - index_state:/app/data
      - ./sample_data:/data/media:ro
    command: ["python", "scripts/index_incremental.py", "-c", "/app/config.docker.yaml"]

  webui:
    build: .
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "7860:7860"
    environment:
      MEDIA_MIND_CONFIG: /app/config.docker.yaml
    volumes:
      - ./config.docker.yaml:/app/config.docker.yaml:ro
      - model_cache:/app/models
      - index_state:/app/data
      - ./sample_data:/data/media:ro
    command: ["python", "-m", "media_mind.webui.app"]

volumes:
  qdrant_storage:
  model_cache:
  index_state:
